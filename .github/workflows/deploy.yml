name: Deploy to GitHub Pages

# 推到 main 就自動 build（vue-tsc + vite）並部署到 GitHub Pages。
# 倉庫 Settings → Pages → Source 要選「GitHub Actions」。
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# 同一時間只跑一個部署，新的取代排隊中的舊的。
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build
      # Pages 已在 repo 設定為「GitHub Actions」來源，這裡只讀設定、不嘗試建立。
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
